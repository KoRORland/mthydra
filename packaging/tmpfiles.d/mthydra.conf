# tmpfiles.d — create /var/lib/mthydra layout with correct ownership and mode
# Run once at deploy time: systemd-tmpfiles --create packaging/tmpfiles.d/mthydra.conf
# Or automatically on boot if placed in /usr/lib/tmpfiles.d/

# Type  Path                          Mode  User     Group    Age
d       /var/lib/mthydra              0700  mthydra  mthydra  -
d       /var/lib/mthydra/tmp          0700  mthydra  mthydra  -
d       /var/lib/mthydra/logs         0700  mthydra  mthydra  -
d       /etc/mthydra                  0750  root     mthydra  -
